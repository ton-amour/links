<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Amour | Maison Florale </title>
    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-black: #000000;
            --primary-white: #FFFFFF;
            --primary-cream: #F9F6F2;
            --secondary-rose-gold: #B76E79;
            --secondary-soft-pink: #F4E1E1;
            --secondary-deep-chocolate: #3D2B1F;
        }

        body {
            background-color: var(--primary-cream);
            color: var(--primary-black);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .btn-primary {
            background-color: transparent;
            color: var(--primary-black);
            border-radius: 0px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            border: 1px solid var(--primary-black);
        }

        .btn-primary:visited {
            color: var(--primary-black);
        }

        .btn-primary:hover,
        .btn-primary:focus-visible,
        .btn-primary:active {
            background-color: var(--primary-black);
            color: var(--primary-white);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-black);
            border: 1px solid var(--primary-black);
            border-radius: 0px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: var(--primary-black);
            color: var(--primary-white);
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            max-width: 216px;
            margin: 0 auto;
        }

        .social-icon {
            transition: opacity 0.3s ease;
            opacity: 0.4;
        }

        .social-icon:hover {
            opacity: 1;
        }
    </style>
</head>
